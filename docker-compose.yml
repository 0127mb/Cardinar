services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cardinar_api
    env_file:
      - .env
    environment:
      PORT: 3001
      NODE_ENV: production
      DB_LOGGING: "false"
    ports:
      - "3001:3001"
    restart: unless-stopped
    networks:
      - cardinar_network

  postgres:
    image: postgres:16-alpine
    container_name: cardinar_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: cardinar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cardinar_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["local-infrastructure"]

  postgres_test:
    image: postgres:16-alpine
    container_name: cardinar_test_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: cardinar_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    networks:
      - cardinar_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["test-infrastructure"]

  redis:
    image: redis:7-alpine
    container_name: cardinar_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cardinar_network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["local-infrastructure"]

volumes:
  postgres_data:
  postgres_test_data:
  redis_data:

networks:
  cardinar_network:
    driver: bridge
